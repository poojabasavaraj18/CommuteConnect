<div class="edit-dialog">

  <div class="dialog-header">
    <div>
      <h2>Edit Ride</h2>
      <p class="subtitle">Update the details of your posted ride</p>
    </div>
    <button class="close-btn" (click)="cancel()" [disabled]="saving" aria-label="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="edit-post-form">

    <div class="error" *ngIf="errorMessage">
      <mat-icon>error_outline</mat-icon>
      {{ errorMessage }}
    </div>

    <!-- Origin / Destination -->
    <div class="row-2">
      <div class="field">
        <label>Origin</label>
        <div class="input-wrap">
          <span class="dot green"></span>
          <input [(ngModel)]="origin" placeholder="Enter starting location" />
        </div>
      </div>

      <div class="field">
        <label>Destination</label>
        <div class="input-wrap">
          <span class="dot blue"></span>
          <input [(ngModel)]="destination" placeholder="Enter destination" />
        </div>
      </div>
    </div>

    <!-- Date -->
    <div class="field">
      <label>Travel Date</label>
      <div class="input-wrap">
        <mat-icon>calendar_today</mat-icon>
        <input type="date" [(ngModel)]="travelDate" />
      </div>
    </div>

    <!-- Seats / Time -->
    <div class="row-2">
      <div class="field">
        <label>Available Seats</label>
        <div class="input-wrap">
          <mat-icon>airline_seat_recline_normal</mat-icon>
          <input type="number" min="1" [(ngModel)]="availableSeats" />
        </div>
      </div>

      <div class="field">
        <label>Travel Time</label>
        <div class="time-row">
          <div class="input-wrap time-input">
            <mat-icon>schedule</mat-icon>
            <input type="text" placeholder="00:00" maxlength="5" [(ngModel)]="travelTimeText" autocomplete="off" />
          </div>
          <div class="period-select">
            <select [(ngModel)]="travelPeriod" class="period-dropdown">
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div class="field">
      <label>Notes <span class="opt">(Optional)</span></label>
      <textarea [(ngModel)]="notes" rows="2" maxlength="200" placeholder="Add any notes for passengers..."></textarea>
    </div>

  </div>

  <div class="dialog-actions">
    <button class="btn-cancel" (click)="cancel()" [disabled]="saving">
      Cancel
    </button>

    <button class="btn-save" (click)="save()" [disabled]="saving">
      <mat-icon>{{ saving ? 'hourglass_empty' : 'save' }}</mat-icon>
      {{ saving ? 'Saving…' : 'Save Changes' }}
    </button>
  </div>

</div>
