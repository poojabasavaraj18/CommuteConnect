<div class="create-ride-panel">

  <button class="close-btn" (click)="close()"><mat-icon>close</mat-icon></button>

  <h2>Create a Ride</h2>
  <p class="muted">Offer a ride and connect with others</p>

  <form [formGroup]="postForm" (ngSubmit)="createPost()" class="side-form">

    <label>From</label>
    <div class="input-wrap">
      <span class="dot green"></span>
      <input formControlName="origin" placeholder="Enter starting location" />
      <mat-icon class="trail">my_location</mat-icon>
    </div>
    <small class="err" *ngIf="postForm.get('origin')?.touched && postForm.get('origin')?.invalid">
      Origin is required
    </small>

    <label>To</label>
    <div class="input-wrap">
      <span class="dot blue"></span>
      <input formControlName="destination" placeholder="Enter destination" />
      <mat-icon class="trail">place</mat-icon>
    </div>
    <small class="err" *ngIf="postForm.get('destination')?.touched && postForm.get('destination')?.invalid">
      Destination is required
    </small>

<!-- Date -->
<label>Date</label>
<div class="input-wrap full-width">
  <mat-icon>calendar_today</mat-icon>
  <input type="date" formControlName="travelDate" />
</div>

<!-- Seats + Time -->
<div class="double-fields">

  <div class="field">
    <label>Seats Available</label>
    <div class="input-wrap">
      <mat-icon>person</mat-icon>
      <select formControlName="availableSeats">
        <option [ngValue]="1">1</option>
        <option [ngValue]="2">2</option>
        <option [ngValue]="3">3</option>
        <option [ngValue]="4">4</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Time</label>
    <div class="input-wrap">
      <mat-icon>schedule</mat-icon>
      <input type="time" formControlName="travelTime" />
    </div>
  </div>

</div>

  

    <label>Notes <span class="opt">(Optional)</span></label>
    <textarea formControlName="notes" maxlength="200"
              placeholder="Add any notes for passengers..."></textarea>
    <div class="char-count">{{ notesCount }}/200</div>

    <div class="err-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

    <button type="submit" class="create-btn-full" [disabled]="loading">
      <mat-icon>directions_car</mat-icon>
      {{ loading ? 'Creating...' : 'Create Ride' }}
    </button>
  </form>

  <div class="tips-box">
    <div class="tips-head"><mat-icon>lightbulb</mat-icon> Ride Tips</div>
    <p>Add clear details and be polite to get more interest in your ride.</p>
  </div>

</div>
