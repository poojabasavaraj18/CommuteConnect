<h2 mat-dialog-title>Create Post</h2>

<mat-dialog-content>

    <form [formGroup]="postForm">

        <div class="grid">

            <mat-form-field appearance="outline">

                <mat-label>Origin</mat-label>

                <input
                    matInput
                    formControlName="origin">

                <mat-error *ngIf="postForm.get('origin')?.invalid">
                    Origin is required
                </mat-error>

            </mat-form-field>

            <mat-form-field appearance="outline">

                <mat-label>Destination</mat-label>

                <input
                    matInput
                    formControlName="destination">

                <mat-error *ngIf="postForm.get('destination')?.invalid">
                    Destination is required
                </mat-error>

            </mat-form-field>

            <mat-form-field appearance="outline">

                <mat-label>Travel Date</mat-label>

                <input
                    matInput
                    type="date"
                    formControlName="travelDate">

            </mat-form-field>

            <mat-form-field appearance="outline">

                <mat-label>Travel Time</mat-label>

                <input
                    matInput
                    type="time"
                    formControlName="travelTime">

            </mat-form-field>

            <mat-form-field appearance="outline">

                <mat-label>Available Seats</mat-label>

                <input
                    matInput
                    type="number"
                    formControlName="availableSeats">

                <mat-error *ngIf="postForm.get('availableSeats')?.invalid">
                    Minimum 1 seat required
                </mat-error>

            </mat-form-field>

        </div>

        <mat-form-field
            appearance="outline"
            class="full-width">

            <mat-label>Notes</mat-label>

            <textarea
                matInput
                rows="4"
                formControlName="notes">
            </textarea>

        </mat-form-field>

    </form>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button
        mat-stroked-button
        color="primary"
        (click)="close()">

        Cancel

    </button>

    <button
        mat-raised-button
        color="primary"
        (click)="createPost()"
        [disabled]="loading">

        {{ loading ? 'Creating...' : 'Create Post' }}

    </button>

</mat-dialog-actions>
