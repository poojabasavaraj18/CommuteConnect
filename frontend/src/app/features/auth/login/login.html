<div class="container">

  <div class="card">

    <h1>🚗 CommuteConnect</h1>

    <h3>Login</h3>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email">

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button (click)="login()">
      Login
    </button>

    <p class="error">
      {{ errorMessage }}
    </p>

    <p class="bottom">

      Don't have an account?

      <a routerLink="/register">
        Register
      </a>

    </p>

  </div>

</div>
