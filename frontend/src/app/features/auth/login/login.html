<div class="login-container">

  <mat-card class="login-card">

    <h1>🚗 CommuteConnect</h1>

    <p class="tagline">

      Find, Share & Commute Together

    </p>

    <mat-form-field appearance="outline">

      <mat-label>Email</mat-label>

      <input
        matInput
        type="email"
        [(ngModel)]="email"
        [disabled]="loading">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Password</mat-label>

      <input
        matInput
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        [disabled]="loading">

      <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="showPassword = !showPassword"
        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">

        <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>

      </button>

    </mat-form-field>

    <div
      class="error"
      *ngIf="errorMessage">

      {{ errorMessage }}

    </div>

    <button
      mat-raised-button
      color="primary"
      [disabled]="loading"
      (click)="login()">

      <mat-spinner
        *ngIf="loading"
        diameter="20"
        class="btn-spinner">
      </mat-spinner>

      {{ loading ? 'Logging in…' : 'Login' }}

    </button>

    <div class="register-link">

      <p>

        Don't have an account?

        <a routerLink="/register">

          Register

        </a>

      </p>

    </div>

  </mat-card>

</div>
