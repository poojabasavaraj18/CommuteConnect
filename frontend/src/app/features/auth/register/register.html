<div class="login-container">

  <mat-card class="login-card">

    <h1>🚗 CommuteConnect</h1>

    <p class="tagline">

      Find, Share & Commute Together

    </p>

    <mat-form-field appearance="outline">

      <mat-label>Name</mat-label>

      <input
        matInput
        [(ngModel)]="name">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Email</mat-label>

      <input
        matInput
        type="email"
        [(ngModel)]="email">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Password</mat-label>

      <input
        matInput
        type="password"
        [(ngModel)]="password">

    </mat-form-field>

    <div
      class="error"
      *ngIf="errorMessage">

      {{ errorMessage }}

    </div>

    <button
      mat-raised-button
      color="primary"
      (click)="register()">

      Register

    </button>

    <div class="register-link">

      <p>

        Already have an account?

        <a routerLink="/login">

          Login

        </a>

      </p>

    </div>

  </mat-card>

</div>
