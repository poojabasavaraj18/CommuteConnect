<div class="profile-page">

  <div class="loading" *ngIf="loading">
    <mat-spinner diameter="32"></mat-spinner>
    <p>Loading profile…</p>
  </div>

  <div class="profile-content" *ngIf="!loading && profile">

    <div class="profile-card">

      <button class="close-btn" (click)="close()" aria-label="Close">
        <mat-icon>close</mat-icon>
      </button>

      <div class="card-header">
        <div class="avatar">{{ getInitials(profile.name) }}</div>
        <div class="identity">
          <h1>{{ profile.name }}</h1>
          <span class="email">{{ profile.email }}</span>
        </div>
      </div>

      <div class="banner success" *ngIf="successMessage">
        <mat-icon>check_circle</mat-icon>
        {{ successMessage }}
      </div>

      <div class="banner error" *ngIf="errorMessage">
        <mat-icon>error_outline</mat-icon>
        {{ errorMessage }}
      </div>

      <!-- VIEW MODE -->
      <ng-container *ngIf="!editing">

        <div class="field-row">
          <span class="label">Name</span>
          <span class="value">{{ profile.name }}</span>
        </div>

        <div class="field-row">
          <span class="label">Email</span>
          <span class="value">{{ profile.email }}</span>
        </div>

        <div class="field-row">
          <span class="label">Member Since</span>
          <span class="value">{{ profile.createdAt | date:'dd MMM yyyy' }}</span>
        </div>

        <div class="actions">
          <button class="btn btn-outline" (click)="startEditing()">
            <mat-icon>edit</mat-icon>
            Edit Profile
          </button>
        </div>

      </ng-container>

      <!-- EDIT MODE -->
      <ng-container *ngIf="editing">

        <div class="edit-fields">

          <div class="input-group">
            <label class="label">Name</label>
            <mat-form-field appearance="outline" class="full-width">
              <input matInput [(ngModel)]="name">
            </mat-form-field>
          </div>

          <div class="input-group">
            <label class="label">Email</label>
            <mat-form-field appearance="outline" class="full-width">
              <input matInput type="email" [(ngModel)]="email">
            </mat-form-field>
          </div>

        </div>

        <div class="actions">
          <button class="btn btn-outline" (click)="cancelEditing()" [disabled]="saving">
            Cancel
          </button>

          <button class="btn btn-primary" (click)="saveProfile()" [disabled]="saving">
            <mat-spinner *ngIf="saving" diameter="16" class="btn-spinner"></mat-spinner>
            {{ saving ? 'Saving…' : 'Save Changes' }}
          </button>
        </div>

      </ng-container>

    </div>

  </div>

</div>
